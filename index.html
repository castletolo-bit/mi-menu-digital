<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lectura Fintech.csv</title>
</head>
<body>
<h2>Lectura de archivo fintech.csv</h2>
<pre id="salida"></pre>

<script>
const URL_CSV = "./data/fintech.csv";

fetch(URL_CSV)
  .then(res => res.text())
  .then(text => {
    // Mostrar contenido crudo
    document.getElementById("salida").textContent = text;
    console.log("Contenido crudo del CSV:\n", text);

    // Separar filas
    const filas = text.trim().split(/\r?\n/);
    console.log("Filas:", filas);

    // Decodificar cada celda con atob()
    const datosDecodificados = filas.slice(1).map(fila => {
      const celdas = fila.split(",");
      return {
        IdCliente: atob(celdas[0]),
        Nombre: atob(celdas[1]),
        Apellidos: atob(celdas[2]),
        Direccion: atob(celdas[3]),
        Periodo: atob(celdas[4]),
        FechaPago: atob(celdas[5]),
        PagoTotal: parseFloat(atob(celdas[6])),
        Capital: parseFloat(atob(celdas[7])),
        Intereses: parseFloat(atob(celdas[8])),
        Seguros: parseFloat(atob(celdas[9]))
      };
    });

    console.log("Datos decodificados:", datosDecodificados);

    // Mostrar en pantalla también
    document.getElementById("salida").textContent += 
      "\n\n=== Datos decodificados ===\n" + 
      JSON.stringify(datosDecodificados, null, 2);
  })
  .catch(err => {
    console.error("Error cargando CSV:", err);
    document.getElementById("salida").textContent = "Error cargando CSV: " + err;
  });
</script>
</body>
</html>
