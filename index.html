<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fintech Demo - Estado de Cuenta</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    margin:0;
    font-family: 'Segoe UI', sans-serif;
    display:flex;
    height:100vh;
    background:#f1f5f9;
}

#left{
    width:70%;
    padding:40px;
    overflow-y:auto;
}

#right{
    width:30%;
    padding:40px;
    background:#0f172a;
    color:white;
}

h1{margin-top:0;}
input,button{
    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:15px;
    border:none;
    border-radius:6px;
}

button{
    background:#2563eb;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.resumen{
    background:#e2e8f0;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
}
</style>
</head>

<body>

<div id="left">
    <h1>Estado de Cuenta</h1>
    <div id="resultado"></div>
</div>

<div id="right">
    <h2>Consulta Cliente</h2>

    <label>Ingrese IdCliente:</label>
    <input type="text" id="clienteId">

    <button onclick="buscarCliente()">Consultar</button>
</div>

<script>

// 🔗 URL del CSV público de Google Sheets
const sheetCSV = 
"https://docs.google.com/spreadsheets/d/e/2PACX-1vQmcCDHBBBmHprpvT85OTTgiLs0TyykUgAyjNyVXAM_q9Zs8uo9cM3ye_3qzUk310HLX2iHGTsNiv8M/pub?output=csv";

let datos = [];

// 🚀 Cargar CSV desde URL del Google Sheets
fetch(sheetCSV)
.then(resp => resp.text())
.then(texto => {
    const lineas = texto.trim().split("\n");

    datos = lineas.map(linea=>{
        const p = linea.split(",");
        return {
            IdCliente:p[0],
            Nombre:p[1],
            Apellidos:p[2],
            Direccion:p[3],
            Periodo:p[4],
            FechaPago:p[5],
            PagoTotal:parseFloat(p[6]||0),
            Capital:parseFloat(p[7]||0),
            Intereses:parseFloat(p[8]||0),
            Seguros:parseFloat(p[9]||0)
        };
    });
})
.catch(err=>{
    console.error("Error cargando CSV:",err);
    document.getElementById("resultado").innerHTML="<p>Error cargando datos.</p>";
});

// 🔎 Buscar cliente y mostrar
function buscarCliente(){
    const id = document.getElementById("clienteId").value.trim();
    const resultado = document.getElementById("resultado");
    const pagos = datos.filter(d=>d.IdCliente === id);

    if(pagos.length===0){
        resultado.innerHTML="<p>No se encontró cliente.</p>";
        return;
    }

    const cliente = pagos[0];
    const totalPagado = pagos.reduce((acc,p)=>acc+p.PagoTotal,0);
    const totalCapital = pagos.reduce((acc,p)=>acc+p.Capital,0);
    const totalIntereses = pagos.reduce((acc,p)=>acc+p.Intereses,0);

    let html=`
        <div class="resumen">
            <h3>${cliente.Nombre} ${cliente.Apellidos}</h3>
            <p><strong>Dirección:</strong> ${cliente.Direccion}</p>
            <p><strong>Total Pagado:</strong> $${totalPagado.toFixed(2)}</p>
            <p><strong>Capital:</strong> $${totalCapital.toFixed(2)}</p>
            <p><strong>Intereses:</strong> $${totalIntereses.toFixed(2)}</p>
        </div>
    `;

    pagos.forEach(p=>{
        html+=`
        <div class="card">
            <p><strong>Periodo:</strong> ${p.Periodo}</p>
            <p><strong>Fecha:</strong> ${p.FechaPago}</p>
            <p><strong>Pago:</strong> $${p.PagoTotal.toFixed(2)}</p>
            <p><strong>Capital:</strong> $${p.Capital.toFixed(2)}</p>
            <p><strong>Intereses:</strong> $${p.Intereses.toFixed(2)}</p>
            <p><strong>Seguros:</strong> $${p.Seguros.toFixed(2)}</p>
        </div>
        `;
    });

    html+=`<button onclick="descargarPDF('${id}')">Descargar PDF</button>`;
    resultado.innerHTML=html;
}

// 💎 Generar PDF estilo banca
function descargarPDF(id){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    const pagos = datos.filter(d=>d.IdCliente===id);
    const cliente = pagos[0];

    doc.setFontSize(18);
    doc.text("ESTADO DE CUENTA", 70, 20);

    doc.setFontSize(12);
    doc.text(`Cliente: ${cliente.Nombre} ${cliente.Apellidos}`, 20, 40);
    doc.text(`Dirección: ${cliente.Direccion}`, 20, 50);

    let y=70;
    pagos.forEach(p=>{
        doc.text(`Periodo: ${p.Periodo}   Fecha: ${p.FechaPago}`,20,y);
        y+=8;
        doc.text(`Pago: $${p.PagoTotal.toFixed(2)}  Capital: $${p.Capital.toFixed(2)}`,20,y);
        y+=8;
        doc.text(`Intereses: $${p.Intereses.toFixed(2)}  Seguros: $${p.Seguros.toFixed(2)}`,20,y);
        y+=12;
    });

    doc.save("EstadoCuenta_"+id+".pdf");
}

</script>
</body>
</html>
